<header class="navbar">
  <a href="{% url 'home' %}" class="navbar__brand">
    <span class="logo-mark">{{ BRAND_INITIALS }}</span>
    <span class="brand-title">{{ BRAND_NAME }}</span>
    <span class="brand-eyebrow">{{ BRAND_EYEBROW }}</span>
  </a>

  <nav class="nav-group">
    {% for item in NAV_ITEMS %}
      <a href="{% url item.url_name %}"
         class="nav-item {% if active_nav == item.key %}nav-item--active{% endif %}">
        {{ item.label }}
      </a>
    {% endfor %}
    {% if user.is_authenticated %}
      <a href="{% url 'logout' %}" class="btn btn--ghost btn--sm">Sign out</a>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn--primary btn--sm">Sign in →</a>
    {% endif %}
  </nav>
</header>
